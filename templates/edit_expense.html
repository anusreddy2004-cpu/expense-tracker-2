<!DOCTYPE html>
<html>
<head>

    <title>Edit Expense</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="container mt-5">

    <h1 class="mb-4">
        Edit Expense
    </h1>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Title
            </label>

            <input
            type="text"
            name="title"
            value="{{ expense['title'] }}"
            class="form-control"
            required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Amount
            </label>

            <input
            type="number"
            name="amount"
            value="{{ expense['amount'] }}"
            class="form-control"
            required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Category
            </label>

            <input
            type="text"
            name="category"
            value="{{ expense['category'] }}"
            class="form-control"
            required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Date
            </label>

            <input
            type="date"
            name="date"
            value="{{ expense['date'] }}"
            class="form-control"
            required>

        </div>

        <button
        type="submit"
        class="btn btn-warning">

            Update Expense

        </button>

    </form>

    <br>

    <a href="/" class="btn btn-secondary">
        Back
    </a>

</body>
</html>
