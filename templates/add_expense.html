<!DOCTYPE html>
<html>
<head>

    <title>Add Expense</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="container mt-4">

    <h1 class="mb-4">
        Add Expense
    </h1>

    <form method="POST">

        <!-- TITLE -->

        <div class="mb-3">

            <label class="form-label">
                Title
            </label>

            <input
            type="text"
            name="title"
            class="form-control"
            required>

        </div>

        <!-- AMOUNT -->

        <div class="mb-3">

            <label class="form-label">
                Amount
            </label>

            <input
            type="number"
            name="amount"
            class="form-control"
            required>

        </div>

        <!-- CATEGORY -->

        <div class="mb-3">

            <label class="form-label">
                Category
            </label>

            <select
            name="category"
            class="form-select"
            required>

                <option value="">
                    Select Category
                </option>

                <option value="Food">
                    Food
                </option>

                <option value="Travel">
                    Travel
                </option>

                <option value="Shopping">
                    Shopping
                </option>

                <option value="Bills">
                    Bills
                </option>

            </select>

        </div>

        <!-- DATE -->

        <div class="mb-3">

            <label class="form-label">
                Date
            </label>

            <input
            type="date"
            name="date"
            class="form-control"
            required>

        </div>

        <!-- BUTTON -->

        <button
        type="submit"
        class="btn btn-success">

            Save Expense

        </button>

        <a
        href="/"
        class="btn btn-secondary">

            Back

        </a>

    </form>

</body>
</html>
